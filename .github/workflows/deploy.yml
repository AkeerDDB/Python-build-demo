name: Build & Test Python App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests and generate report
        run: PYTHONPATH=. python -m pytest -v --junitxml=pytest.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest.xml

      - name: Save test log
        run: PYTHONPATH=. python -m pytest -v | tee pytest.log

      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log

      - name: Create zip archive
        run: zip -r build.zip main.py utils.py tests/

      - name: Upload build archive
        uses: actions/upload-artifact@v4
        with:
          name: project-build
          path: build.zip

      - name: Run app
        run: python main.py
